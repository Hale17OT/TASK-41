# Database - MUST be provided via environment variables
jdbc.url=${JDBC_URL}
jdbc.username=${DB_USER}
jdbc.password=${DB_PASSWORD}

# Security - MUST be provided via environment variables (no defaults)
security.aes.key=${AES_SECRET_KEY}
security.hmac.key=${HMAC_SECRET_KEY}
security.bcrypt.rounds=12
security.lockout.max-attempts=5
security.lockout.duration-minutes=15

# Session
session.timeout.minutes=60

# File uploads
upload.base-path=${UPLOAD_DIR:./uploads}
upload.max-file-size=10485760

# Notifications
notification.poll.timeout-seconds=30
notification.lan-relay.enabled=false
